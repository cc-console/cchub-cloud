<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cc-console</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; overflow: hidden;
        background: #0a0c11; color: #cdd6e4;
        font: 14px/1.5 -apple-system, "SF Pro Text", system-ui, sans-serif;
      }

      /* Soft drifting aurora behind everything. */
      .bg { position: fixed; inset: 0; overflow: hidden; }
      .blob { position: absolute; border-radius: 50%; filter: blur(64px); opacity: .5;
        animation: drift 9s ease-in-out infinite; }
      .b1 { width: 340px; height: 340px; background: #5666ee; top: -90px; left: -60px; }
      .b2 { width: 300px; height: 300px; background: #7c8cff; bottom: -100px; right: -70px; animation-delay: -3s; }
      .b3 { width: 240px; height: 240px; background: #3a4cd6; top: 42%; left: 56%; opacity: .3; animation-delay: -6s; }
      @keyframes drift {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33%      { transform: translate(28px, 20px) scale(1.1); }
        66%      { transform: translate(-22px, 30px) scale(.95); }
      }

      .wrap { position: relative; height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
        -webkit-user-select: none; user-select: none; }

      /* Logo tile: gradient chip with a floating idle and a glossy sweep. */
      .logo { width: 88px; height: 88px; border-radius: 22px; position: relative;
        display: grid; place-items: center; overflow: hidden;
        background: linear-gradient(145deg, #6d83ff, #4a5cf0);
        box-shadow: 0 14px 44px rgba(86,102,238,.45), inset 0 1px 0 rgba(255,255,255,.25);
        animation: rise .7s cubic-bezier(.2,.8,.2,1) both, float 3.6s ease-in-out .7s infinite; }
      .logo svg { width: 46px; height: 46px; position: relative; z-index: 1; }
      .logo::after { content: ""; position: absolute; inset: 0;
        background: linear-gradient(110deg, transparent 32%, rgba(255,255,255,.4) 50%, transparent 68%);
        background-size: 220% 100%; animation: sweep 2.8s ease-in-out infinite; }
      @keyframes rise  { from { opacity: 0; transform: translateY(14px) scale(.9); } to { opacity: 1; transform: none; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes sweep { 0% { background-position: 145% 0; } 60%, 100% { background-position: -145% 0; } }

      .title { font-size: 22px; font-weight: 700; letter-spacing: .3px;
        background: linear-gradient(90deg, #e9eefc, #9fb0ff);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        animation: fade .6s ease .15s both; }
      .sub { font-size: 12.5px; color: #7c889c; animation: fade .6s ease .3s both; }

      /* Indeterminate progress sliver. */
      .bar { width: 184px; height: 4px; border-radius: 99px; overflow: hidden;
        background: rgba(255,255,255,.08); animation: fade .6s ease .4s both; }
      .bar::before { content: ""; display: block; height: 100%; width: 38%; border-radius: 99px;
        background: linear-gradient(90deg, #6d83ff, #a9b6ff);
        animation: slide 1.3s ease-in-out infinite; }
      @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(330%); } }
      @keyframes fade  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

      .ver { position: fixed; left: 0; right: 0; bottom: 18px; text-align: center;
        display: flex; gap: 8px; align-items: center; justify-content: center;
        font-size: 11px; color: #5b6678; font-variant-numeric: tabular-nums;
        animation: fade .6s ease .5s both; }
      .ver .pill { font-size: 9.5px; font-weight: 700; letter-spacing: .5px; color: #aab6ff;
        border: 1px solid rgba(124,140,255,.4); border-radius: 99px; padding: 1px 7px; }

      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </head>
  <body>
    <!-- Splash only. The Rust setup hook (app/src-tauri/src/main.rs) reveals this
         window instantly, injects the build version into #ver, then navigates to the
         local daemon (http://127.0.0.1:<port>/) once it is listening. -->
    <div class="bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
    <div class="wrap">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 7l5 5-5 5M13 17h6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="title">cc-console</div>
      <div class="sub">starting local daemon…</div>
      <div class="bar"></div>
    </div>
    <div class="ver"><span id="ver">v…</span><span class="pill">BETA</span></div>
  </body>
</html>
